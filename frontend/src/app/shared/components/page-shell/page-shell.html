<mat-toolbar class="toolbar">
  <a routerLink="/" class="brand">
    <mat-icon class="brand-icon">auto_stories</mat-icon>
    <span class="brand-text">LLM Doc Generator</span>
  </a>
  <span class="spacer"></span>
  <nav class="nav-links">
    <a mat-button routerLink="/submit" routerLinkActive="nav-active">
      <mat-icon>rocket_launch</mat-icon>
      New Job
    </a>
    <a mat-button routerLink="/jobs" routerLinkActive="nav-active">
      <mat-icon>history</mat-icon>
      All Jobs
    </a>
  </nav>
</mat-toolbar>

@if (loadingService.isLoading()) {
  <mat-progress-bar mode="indeterminate" class="global-loader"></mat-progress-bar>
}

<main class="main-content">
  <router-outlet></router-outlet>
</main>
