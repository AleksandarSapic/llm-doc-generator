server {
    listen 80;
    root  /usr/share/nginx/html;
    index index.html;

    # Suppress nginx version from error pages and the Server response header
    server_tokens off;

    # ── Caching ──────────────────────────────────────────────────────────────

    # index.html must never be cached: browsers must re-fetch it on every visit
    # so that a new deployment (with new hashed asset filenames) is picked up
    # immediately without a hard refresh.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # Angular production builds append a content hash to every JS/CSS filename
    # (e.g. main.abc123.js). These filenames change whenever the content changes,
    # so it is safe to cache them for up to a year with the immutable directive.
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────

    # Forward all /api/* requests to the Spring Boot backend service.
    # In Docker Compose, service names resolve as hostnames on the shared network.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;

        # Pass client identity to the backend
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (Server-Sent Events) — job progress streaming requires nginx to
        # forward chunks immediately rather than buffering the full response.
        proxy_buffering    off;
        proxy_cache        off;

        # Extend read timeout for long-running SSE connections (default is 60s).
        proxy_read_timeout 3600s;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────

    # Angular Router handles navigation client-side. Any URL that does not match
    # a real file on disk (e.g. /jobs/123) must serve index.html so the app can
    # bootstrap and take over routing. Without this, a direct URL or hard refresh
    # would return a 404 from nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ──────────────────────────────────────────────────────

    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Compression ───────────────────────────────────────────────────────────

    gzip            on;
    gzip_vary       on;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/x-javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;
}
