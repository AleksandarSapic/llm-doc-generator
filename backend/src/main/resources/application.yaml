spring:
  application:
    name: LLM Documentation Generator
  config:
    import: file:.env[.properties]
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/llm_doc_generator}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-5.4-nano
          temperature: 0.2
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-6
          temperature: 0.2
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}

app:
  llm:
    provider: openai
    max-retries: 3
    request-timeout-ms: 90000
    default-models:
      openai: gpt-5.4-nano
      ollama: gemma3
      anthropic: claude-sonnet-4-6
  git:
    clone-depth: 1
    clone-timeout-seconds: 120
    temp-base-dir: ${java.io.tmpdir}
  chunking:
    chunk-token-target: 3000
    chunk-token-overlap: 200
    allowed-extensions:
      - .java
      - .kt
      - .js
      - .ts
      - .tsx
      - .jsx
      - .py
      - .go
      - .rs
      - .cs
      - .cpp
      - .c
      - .h
      - .rb
      - .php
      - .swift
      - .scala
      - .xml
      - .yaml
      - .yml
      - .json
      - .md
      - .sql
      - .sh
      - .el
    ignored-directories:
      - .git
      - node_modules
      - target
      - build
      - dist
      - .gradle
      - __pycache__
      - .venv
      - venv
      - out
      - bin
      - obj

logging:
  level:
    com.aleksandarsapic.llm_doc_generator: DEBUG
    org.eclipse.jgit: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level [%X{jobId}] %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
